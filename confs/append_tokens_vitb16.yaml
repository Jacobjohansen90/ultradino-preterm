# @package _global_

defaults:
  - ../base/base
  - _self_

model:
  auxiliary:
    method: append

  vit:
    type: vitb16
    weights_path: ${local.weights_path.vitb16_2m}
  
  ehr:
    weights_path: ${local.weights_path.ehr}
  
  ehr_transform:
    embedding_dim: 128
    layer_dims: [256]

  predictor:
    layer_dims: [256,64]
