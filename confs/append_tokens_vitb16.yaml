# @package _global_

defaults:
  - ../base/base
  - _self_

data:
  path: path_to_csv.csv
  batch_size: 16
  val_frac: 0.05
  workers: 32

training:
  epochs: 15
  vit_frozen_until: 5  #VIT is frozen until this epoch
  ehr_frozen_until: 10 #EHR is frozen until this epoch

auxiliary:
  method: append

model:
  vit:
    type: vitb16
    weights_path: 
  
  ehr:
    weights_path: /home/jacob/Desktop/NAS/Work/PreTerm/weights/ehr.pt
  
  ehr_transform:
    layer_dims: [256]

  predictor:
    layer_dims: [256,64]
    
optimizer:
  type: AdamW
  learning_rate: 1e-4
  weight_decay: 1e-5

  #AdamW
  adamw_params: [0.9,0.999, 1e-8] #Beta1, Beta2, Epsilon
  
scheduler:
  type: cosine_warmup
  num_warmup_steps: 5
  num_cycles: 2 #A multiplier for the cosine scheduler. 2 means two cycles per epoch, 0.5 means half an epoch etc

loss:
  type: bce
  
device:
  type: cuda
