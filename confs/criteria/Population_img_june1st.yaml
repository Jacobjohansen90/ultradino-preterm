paths:

population_name: OnlyFirstPreg_June

#Operators work as: column_1 [operator] column_2
#Add flow_img when database has the info
image_criteria:
  - name: Image must be Cervix
    action: include
    filter_on: file_path
    function: filter_df_internal
    conditions:
      - condition:
        column: pred
        operator: "=="
        value: "14"

  - name: GA at scan
    action: include
    filter_on: [file_path, CPR_CHILD]
    function: filter_df_internal
    conditions:
      - condition: 
        column: GA_at_scan
        operator: ">="
        value: 112 #16 weeks
      - condition: and
        column: GA_at_scan
        operator: "<="
        value: 168 #24 weeks

  - name: Scan to delivery
    action: include
    filter_on: [file_path, CPR_CHILD]
    function: filter_df_internal
    conditions:
      - condition: 
        column: scan_to_delivery
        operator: ">="
        value: 0 #0 weeks
      - condition: and
        column: scan_to_delivery
        operator: "<="
        value: 210 #30 weeks
 
 
population_criteria:
    #Must have CPR
  - name: Child has CPR
    action: exclude
    filter_on: CPR_CHILD
    function: filter_df_internal
    conditions:
      - condition: 
        column: CPR_CHILD
        operator: "=="
        value: "INVALID"
    
    #Births must not be close
  - name: No close births
    filter_on: ['CPR_MOTHER', 'CPR_CHILD']
    action: exclude
    function: find_close_births
    column: BIRTHDAY
    threshold: 280

    #Must have GA
  - name: Has GA
    filter_on: CPR_CHILD
    action: include
    function: filter_df_external
    conditions:
      - condition: 
        table: ${paths.input_dir_SDS}/mfr.csv
        match_on: CPR_BARN
        column: GESTATIONSALDER_DAGE
        operator: ">"
        value: 0
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Gestationsalder
        operator: ">"
        value: 0

    #Only live birth
  - name: Live birth 
    filter_on: CPR_CHILD
    action: include
    function: filter_df_external
    conditions:
      - condition: 
        table: ${paths.input_dir_SDS}/mfr.csv
        match_on: CPR_BARN
        column: LEVENDE_ELLER_DOEDFOEDT
        operator: "=="
        value: Levendefødt
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: LevendefoedtDoedfoedt
        operator: "=="
        value: "1"

    #Only first pregnancy
  - name: First Pregnancy
    filter_on: CPR_CHILD
    action: exclude
    function: filter_df_external
    conditions:
      - condition: 
        table: ${paths.input_dir_SDS}/mfr.csv
        match_on: CPR_BARN
        column: PARITET
        operator: "!="
        value: "1"
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Paritet
        operator: "!="
        value: "1"

    #Non-twins
  - name: No multi-births
    filter_on: CPR_MOTHER
    action: include
    function: filter_df_external
    conditions:
      - condition: 
        table: ${paths.input_dir_SDS}/mfr.csv
        match_on: CPR_MODER
        column: FOEDSELSLOEBENUMMER
        operator: "unique"
        value: True
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Mor
        column: DW_EK_Foedsel
        operator: "unique"
        value: True

    #No Cerclage
  - name: No Cerclage
    filter_on: BIRTH_ID
    action: exclude
    function: filter_df_external
    conditions:
      - condition: 
        table: ${paths.input_dir_SDS}/mor_diagnoser.csv
        match_on: DW_EK_Foedsel
        column: DiagnoseKode
        operator: "=="
        value: "DO343C"
      - condition: or
        table: ${paths.input_dir_SDS}/mor_procedurer.csv
        match_on: DW_EK_Foedsel
        column: ProcedureKode
        operator: "in"
        value: [KLDD10A, KLDD10B, KMAB00, KMAB01, KLDD20, KMAB03]

  - name: No Cerclage
    filter_on: CPR_MOTHER
    action: exclude_birth
    function: filter_df_external
    conditions:
      - condition:
        table: ${paths.data_dir}/tables/t_afl.csv
        match_on: V_CPR
        conditional_column: D_ODTO
        column: C_TILOPR
        operator: "in"
        value: [KLDD10A, KLDD10B, KMAB00, KMAB01, KLDD20, KMAB03]
      - condition: or
        table: ${paths.data_dir}/tables/t_sksopr.csv
        match_on: V_CPR
        conditional_column: D_ODTO
        column: C_OPR
        operator: "in"
        value: [KLDD10A, KLDD10B, KMAB00, KMAB01]
      - condition: or
        table: ${paths.data_dir}/tables/t_diag.csv
        match_on: V_CPR
        column: C_DIAG
        conditional_column: D_UDDTO
        operator: "=="
        value: "DO343C"

conditional_criteria:
  #C-section (kejsersnit)
  - name: C-section
    filter_on: CPR_CHILD
    function: mark_df_external
    action: exclude
    mark_name: c-section
    conditions:
      - condition:
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Kejsersnit
        operator: "=="
        value: "-1"
      - condition: or
        table: ${paths.input_dir_SDS}/mfr.csv
        match_on: CPR_BARN
        column: MARKOER_KEJSERSNIT
        operator: "!="
        value: "1"

  #Induced
  - name: Induced
    filter_on: CPR_CHILD
    action: include
    mark_name: induced
    function: mark_df_external
    conditions:
      - condition:
        table: ${paths.input_dir_SDS}/mfr.csv
        match_on: CPR_BARN
        column: MARKOER_IGANGSAETTELSE
        operator: "=="
        value: "1"
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Igangsaettelse_Ballonkateter
        operator: "=="
        value: "Ja"
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Igangsaettelse_Medicinsk
        operator: "=="
        value: "Ja"
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Igangsaettelse_HSP
        operator: "=="
        value: "Ja"
 
  #Progesterone_1
  - name: Progesterone
    filter_on: CPR_MOTHER
    action: exclude_birth
    mark_name: progesterone
    function: mark_df_external
    conditions:
      - condition:
        table: ${paths.input_dir_SDS}/epikur_1.csv
        match_on: cpr
        conditional_column: eksd
        column: atc
        operator: "starts_with"
        value: "G03DA04"
      - condition: or
        table: ${paths.input_dir_SDS}/epikur_2.csv
        match_on: cpr
        conditional_column: eksd
        column: atc
        operator: "starts_with"
        value: "G03DA04"
      - condition: or
        table: ${paths.input_dir_SDS}/epikur_3.csv
        match_on: cpr
        conditional_column: eksd
        column: atc
        operator: "starts_with"
        value: "G03DA04"

   #Progesterone_2
  - name: Progesterone
    filter_on: BIRTH_ID
    action: include
    mark_name: progesterone
    function: mark_df_external
    conditions:
      - condition: 
        table: ${paths.input_dir_SDS}/mor_diagnoser.csv
        match_on: DW_EK_Foedsel
        column: DiagnoseKode
        operator: "=="
        value: "BKHA1"

  #Progesterone_3
  - name: Progesterone
    filter_on: CPR_MOTHER
    action: exclude_birth
    mark_name: progesterone
    function: mark_df_external
    conditions:
      - condition: 
        table: ${paths.data_dir}/tables/t_sksube.csv
        match_on: V_CPR
        conditional_column: D_ODTO
        column: C_TILOPR
        operator: "=="
        value: "BKHA1"


  

    

