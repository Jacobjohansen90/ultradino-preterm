defaults:
  - default@
  - _self_

paths:
  input_dir_SDS: /storage/archive/UCPH/DeepFetal/SDS/registers_pseudonymized
  input_dir_SP: /storage/archive/UCPH/DeepFetal/SP/tables1
  holdout_csv: /projects/users/data/UCPH/DeepFetal/projects/ultrasound_preprocessing/splits/PRETERM_RCT_PT_V2/holdout_test_5pct.csv
  
strict: True 


population: 
  population_key: CPR_CHILD
  tables: 
    - table: ${paths.input_dir_SDS}/mfr.csv
      columns:
        CPR_CHILD: CPR_BARN
        CPR_MOTHER: CPR_MODER
        GA: GESTATIONSALDER_DAGE
        BIRTHDAY: FOEDSELSDATO
        Hospital: SYGEHUS
    - table: ${paths.input_dir_SDS}/nyfoedte.csv
      columns:
        CPR_CHILD: CPRnummer_Barn
        CPR_MOTHER: CPRnummer_Mor
        GA: Gestationsalder
        BIRTHDAY: FoedselsDato_Barn
        Hospital: SHAK_Sygehus 

conditional_criteria:
  # GA available at birth
  - action: include
    conditions: 
      - condition: 
        table: ${paths.input_dir_SDS}/mfr.csv
        match_on: CPR_BARN
        column: GESTATIONSALDER_DAGE
        operator: ">"
        value: 0
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Gestationsalder
        operator: ">"
        value: 0
  # Only live birth
  - action: include
    conditions:
      - condition: 
        table: ${paths.input_dir_SDS}/mfr.csv
        match_on: CPR_BARN
        column: LEVENDE_ELLER_DOEDFOEDT
        operator: "=="
        value: Levendefødt
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: LevendefoedtDoedfoedt
        operator: "=="
        value: "1"
  # Not C-section (kejsersnit)
  - action: include
    conditions:
      - condition:
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Kejsersnit
        operator: "=="
        value: "-1"
      - condition: or
        table: ${paths.input_dir_SDS}/mfr.csv
        match_on: CPR_BARN
        column: MARKOER_KEJSERSNIT
        operator: "!="
        value: "1"
  # Not induced
  - action: exclude
    conditions:
      - condition:
        table: ${paths.input_dir_SDS}/mfr.csv
        match_on: CPR_BARN
        column: MARKOER_IGANGSAETTELSE
        operator: "=="
        value: "1"
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Igangsaettelse_Ballonkateter
        operator: "=="
        value: "Ja"
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Igangsaettelse_Medicinsk
        operator: "=="
        value: "Ja"
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Igangsaettelse_HSP
        operator: "=="
        value: "Ja"

custom_criteria:
  # Remove multiple (twin etc.) births
  - function: find_multiple_births
    args: 
      table: ${paths.input_dir_SDS}/nyfoedte.csv
      match_on: CPRnummer_Barn
      birth_id_column: DW_EK_Foedsel
    action: exclude
  - function: find_multiple_births
    args: 
      table: ${paths.input_dir_SDS}/mfr.csv
      match_on: CPR_BARN
      birth_id_column: FOEDSELSLOEBENUMMER
    action: exclude
  # Removes close pregnancies
  - function: find_close_births
    args:
      table: ${paths.input_dir_SDS}/nyfoedte.csv
      match_on: CPRnummer_Barn
      mom_column: CPRnummer_Mor
      birth_id_column: DW_EK_Foedsel
      delivery_date_column: FoedselsDato_Barn
      threshold_days: 280
    action: exclude
  - function: find_close_births
    args:
      table: ${paths.input_dir_SDS}/mfr.csv
      match_on: CPR_BARN
      mom_column: CPR_MODER
      birth_id_column: FOEDSELSLOEBENUMMER
      delivery_date_column: FOEDSELSDATO
      threshold_days: 280
    action: exclude

  
imaging_matching_criteria:
  # Filter1: Scan-to-delivery interval
  # Filter2: GA at scan
  - function: find_images_within_time_windows
    args: 
      scan_date_column: study_date
      image_path_column: file_path
      population_ga_in_days_at_delivery_column: GA
      population_delivery_date_column: BIRTHDAY
      min_diff_days_scan_to_delivery: 0 #0
      max_diff_days_scan_to_delivery: 210 #210
      min_ga_in_days_at_scan: 196 #196
      max_ga_in_days_at_scan: 259 #259
  # Only Cervix (14)
  - function: find_images_with_predicted_classes
    args:
      table: /projects/users/data/UCPH/DeepFetal/projects/common/PN_plane_classification_april2026/Cervix_preds_v1/cervix_preds.csv
      classes: [14]
      #image_path_column: file_path
      class_column: pred
      population_image_path_column: file_path
      image_path_column: file_path
    

