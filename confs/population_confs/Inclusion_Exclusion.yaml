paths:
  input_dir_SDS: /storage/archive/UCPH/DeepFetal/SDS/registers_pseudonymized
  input_dir_SP:  /storage/archive/UCPH/DeepFetal/SP/tables
  data_dir: "/" #This argument comes from Population.yaml
  imaging_metadata_output_formats: ["csv",]
strict: True

population: 
  population_key: CPR_CHILD
  img_path_key: file_path
  
conditional_criteria:
  # GA available at birth
  - action: include
    conditions: 
      - condition: 
        table: ${paths.input_dir_SDS}/mfr.csv
        match_on: CPR_BARN
        column: GESTATIONSALDER_DAGE
        operator: ">"
        value: 0
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Gestationsalder
        operator: ">"
        value: 0
  # Only live birth
  - action: include
    conditions:
      - condition: 
        table: ${paths.input_dir_SDS}/mfr.csv
        match_on: CPR_BARN
        column: LEVENDE_ELLER_DOEDFOEDT
        operator: "=="
        value: Levendefødt
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: LevendefoedtDoedfoedt
        operator: "=="
        value: "1"
  # Not C-section (kejsersnit)
  - action: include
    conditions:
      - condition:
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Kejsersnit
        operator: "=="
        value: "-1"
      - condition: or
        table: ${paths.input_dir_SDS}/mfr.csv
        match_on: CPR_BARN
        column: MARKOER_KEJSERSNIT
        operator: "!="
        value: "1"
  # Not induced
  - action: exclude
    conditions:
      - condition:
        table: ${paths.input_dir_SDS}/mfr.csv
        match_on: CPR_BARN
        column: MARKOER_IGANGSAETTELSE
        operator: "=="
        value: "1"
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Igangsaettelse_Ballonkateter
        operator: "=="
        value: "Ja"
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Igangsaettelse_Medicinsk
        operator: "=="
        value: "Ja"
      - condition: or
        table: ${paths.input_dir_SDS}/nyfoedte.csv
        match_on: CPRnummer_Barn
        column: Igangsaettelse_HSP
        operator: "=="
        value: "Ja"

custom_criteria:
  # Removes twin pregnancies AND close pregnancies
  - function: find_close_births
    args:
      table: ${paths.input_dir_SDS}/nyfoedte.csv
      match_on: CPRnummer_Barn
      mom_column: CPRnummer_Mor
      birth_id_column: DW_EK_Foedsel
      delivery_date_column: FoedselsDato_Barn
      threshold_days: 280
    action: exclude
  - function: find_close_births
    args:
      table: ${paths.input_dir_SDS}/mfr.csv
      match_on: CPR_BARN
      mom_column: CPR_MODER
      birth_id_column: FOEDSELSLOEBENUMMER
      delivery_date_column: FOEDSELSDATO
      threshold_days: 280
    action: exclude
  #- function: find_multiple_pregnancies
  #  args:
  #    table: ${paths.input_dir_SDS}/nyfoedte.csv
  #    match_on: CPRnummer_Barn
  #    birth_id_column: DW_EK_Foedsel
  #  action: exclude
  #- function: find_multiple_pregnancies
  #  args:
  #    table: ${paths.input_dir_SDS}/mfr.csv
  #    match_on: CPR_BARN
  #    birth_id_column: FOEDSELSLOEBENUMMER
  #  action: exclude

imaging_matching_criteria:
  # Scan-to-delivery interval
  - function: find_images_and_timedeltas
    args: 
      #child_id_column: CPR_CHILD 
      population_delivery_date_column: Birthday
      population_ga_in_days_at_delivery_column: GA
      scan_date_column: study_date
      image_path_column: "file_path"
      min_diff_days_scan_to_delivery: 0 #0
      max_diff_days_scan_to_delivery: 210 #210
      min_ga_in_days_at_scan: 126 # 126
      max_ga_in_days_at_scan: 237 # 237
       # check that diff is  correct to account for scan < bday
    action: include
  - function: find_images_with_predicted_classes
    # requires that "find_images_and_timedeltas" is run first to generate imaging metadata dataframe
    args:
      table: ${paths.data_dir}/cervix_preds.csv
      classes_to_include: [14]
      class_column: pred
      image_path_column: ${population.img_path_key}
    action: include
 
 
 

