debug: False

paths:
  input_dir_SDS: /storage/archive/UCPH/DeepFetal/SDS/registers_pseudonymized/
  data_dir: /projects/users/data/UCPH/DeepFetal/projects/preterm/Data/
  SQL_DB: /projects/users/data/UCPH/DeepFetal/ultrasound/tables/DeepFetal_image_database_250526.sqlite
  holdout_csv: /projects/users/data/UCPH/DeepFetal/projects/ultrasound_preprocessing/splits/PRETERM_RCT_PT_V2/holdout_test_5pct.csv
  cervix_preds: /projects/users/data/UCPH/DeepFetal/projects/preterm/Data/tables/cervix_preds.csv
  incl_excl_cfg: /projects/users/data/UCPH/DeepFetal/projects/preterm/ultradino-preterm/confs/criteria/Population_img_june1st.yaml
  flow_imgs: /projects/users/data/UCPH/DeepFetal/projects/preterm/Data/tables/flow_imgs.csv

population: 
  population_key: CPR_CHILD
  types: #By default column types are strings. If not listed here, it will be kept as string
    GA: int
    BIRTHDAY: date
  tables: 
    - table: ${paths.input_dir_SDS}/mfr.csv
      columns:
        CPR_CHILD: CPR_BARN
        CPR_MOTHER: CPR_MODER
        GA: GESTATIONSALDER_DAGE
        BIRTHDAY: FOEDSELSDATO
        Hospital: SYGEHUS
        BIRTH_ID: FOEDSELSLOEBENUMMER
    - table: ${paths.input_dir_SDS}/nyfoedte.csv
      columns:
        CPR_CHILD: CPRnummer_Barn
        CPR_MOTHER: CPRnummer_Mor
        GA: Gestationsalder
        BIRTHDAY: FoedselsDato_Barn
        Hospital: SHAK_Sygehus 
        BIRTH_ID: DW_EK_Foedsel

t_tables:
  poplation_key: CPR_MOTHER
  adm_table: ${paths.input_dir_SDS}/t_adm.csv
  link: K_RECNUM
  
  tables:
    - table: ${paths.input_dir_SDS}/t_sksube.csv
      table_link: V_RECNUM
      include: [V_CPR]

    

imaging:
  metadata_dicom_variables: 
    - ['manufacturer', 'str']
    - ['manufacturer_model_name', 'str']
    - ['study_date','date']
    - ['physical_delta_x', 'float']
    - ['physical_delta_y', 'float']

#Operators work as: column_1 [operator] column_2
merge:
  population_key: CPR_MOTHER
  create_variables:
    - operator: "-"
      var_name: "scan_to_delivery"
      var_type: int
      column_1: "BIRTHDAY"
      column_2: "study_date"
    - operator: "-"
      var_name: "GA_at_scan"
      var_type: int
      column_1: "GA"
      column_2: "scan_to_delivery"


    
