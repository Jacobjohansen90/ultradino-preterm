tbd_criteria:
   #flow imgs
  - name: flow imgs
    action: exclude
    function: filter_df_external
    conditions:
      column: n_imgs
      condition: ">"
      value: 1

	#Progesterone
      - condition: or
        table: ${paths.input_dir_SDS}/t_sksube.csv
        match_on: 
        column: C_TILOPR
        operator: "=="
        value: "BKHA1"
      - condition: or
        table: ${paths.input_dir_SDS}/mor_diagnoser.csv
        match_on: 
        column: DiagnoseKode
        operator: "=="
        value: "BKHA1"

 - name: No Cerclage (MFR)
    filter_on: 
    action: exclude
    function: filter_df_external
    conditions:
      - condition:
        table: ${paths.input_dir_SDS}/t_diag.csv
        match_on: 
        column: C_DIAG
        operator: "=="
        value: "DO343C"
      - condition: or
        table: ${paths.input_dir_SDS}/t_afl.csv
        match_on: 
        column: C_TILOPR
        operator: "in"
        value: [KLDD10A, KLDD10B, KMAB00, KMAB01, KLDD20, KMAB03]
      - condition: or
        table: ${paths.input_dir_SDS}/t_sksopr.csv
        match_on: 
        column: C_OPR
        operator: "in"
        value: [KLDD10A, KLDD10B, KMAB00, KMAB01]



custom_criteria:

  # Removes close pregnancies
  - function: find_close_births
    args:
      table: ${paths.input_dir_SDS}/nyfoedte.csv
      match_on: CPRnummer_Barn
      mom_column: CPRnummer_Mor
      birth_id_column: DW_EK_Foedsel
      delivery_date_column: FoedselsDato_Barn
      threshold_days: 280
    action: exclude
  - function: find_close_births
    args:
      table: ${paths.input_dir_SDS}/mfr.csv
      match_on: CPR_BARN
      mom_column: CPR_MODER
      birth_id_column: FOEDSELSLOEBENUMMER
      delivery_date_column: FOEDSELSDATO
      threshold_days: 280
    action: exclude
