info:
  name: baseline

data:
  path: /projects/users/data/UCPH/DeepFetal/projects/preterm/Data/AnyPreg_June_v2/train.parquet
  test_path: /projects/users/data/UCPH/DeepFetal/projects/preterm/Data/OnlyFirstPreg_June_v2/test.parquet
  batch_size: 128
  val_frac: 0.05
  workers: 64
  ehr_data: []
  img_data: [physical_delta_x, physical_delta_y]
  img_size: [224, 224]
  oversample_ratio: 1 #0 = No oversampling
  label_smoothing_param: 2 #0 = No label smoothing

#remove / ignore / remove_on_GA 
#(Remove from DF if cond is true / ignore / remove if GA < GA_cutoff)
dataset: 
    progesterone: ignore 
    c-section: remove_on_GA
    induced: remove_on_GA

tasks:
  preterm:
    cutoffs: [30,31,32,33,34,35,36,37] #Sharp cutoff (GA < GA_cutoff)
    loss: 'bce'
    weights: [1,1,1,1,1,1,1,1]
  aux_tasks:
    - var: GA
      loss: 'l2'
      weights: 0.01
  
training:
  epochs: 60
  vit_frozen_until: 10  #VIT is frozen until this epoch
  ehr_frozen_until: 10 #EHR is frozen until this epoch
  strategy: 'all'

auxiliary:
  method: append

model:
  vit:
    type: vitb16
    weights_path: /projects/users/data/UCPH/DeepFetal/projects/preterm/other_models/weights/vitb16.pth #VitB
    #weights_path: /projects/users/data/UCPH/DeepFetal/projects/preterm/other_models/weights/oversampled_vitb16.pth 
    #weights_path: /projects/users/data/UCPH/DeepFetal/projects/preterm/other_models/weights/oversampled_vitl16.pth 
    dropout: 0.2
  
  ehr:
    weights_path: 
  
  transform:
    layer_dims: []

  head:
    layer_dims: []
    dropout: 0.2
    
optimizer:
  type: AdamW
  lr: 5e-5
  lr_decay: 0.65
  weight_decay: 1e-2

  #AdamW
  adamw_params: [0.9,0.999, 1e-8] #Beta1, Beta2, Epsilon
  
scheduler:
  type: cosine_warmup
  num_warmup_steps: 10
  num_cycles: 1 #A multiplier for the cosine scheduler. 2 means two cycles over training
  
device:
  type: cuda
