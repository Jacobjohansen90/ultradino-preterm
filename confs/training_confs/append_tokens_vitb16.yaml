info:
  name: baseline

data:
  path: /projects/users/data/UCPH/DeepFetal/projects/preterm/Data/AnyPreg_June_v2/train.parquet
  test_path: /projects/users/data/UCPH/DeepFetal/projects/preterm/Data/OnlyFirstPreg_June_v2/test.parquet
  batch_size: 128
  val_frac: 0.05
  workers: 64
  ga_cutoff_weeks: 34 #Sharp cutoff (GA < GA_cutoff)
  ehr_data: []
  img_data: [physical_delta_x, physical_delta_y]
  img_size: [224, 224]
  oversample: True
  oversample_ratio: 1

#relabel / remove / ignore / remove_on_GA 
#(Relabel as true if cond is true / remove from DF if cond is true / ignore / remove if GA < GA_cutoff)
dataset: 
    progesterone: ignore 
    c-section: remove_on_GA
    induced: remove_on_GA

labels: #Task: [Type of task, loss multiplier]
  tasks:
    preterm: ['bce', 1]
    GA_reg: ['l2', 0.01]
  label_smoothing: True
  label_smoothing_param: 2

training:
  epochs: 40
  vit_frozen_until: 5  #VIT is frozen until this epoch
  ehr_frozen_until: 5 #EHR is frozen until this epoch
  strategy: 'all'

auxiliary:
  method: append

model:
  vit:
    type: vitb16
    weights_path: /projects/users/data/UCPH/DeepFetal/projects/preterm/other_models/weights/vitb16.pth #VitB
    #weights_path: /projects/users/data/UCPH/DeepFetal/projects/preterm/other_models/weights/oversampled_vitb16.pth #Oversampled
    #weights_path: /projects/users/data/UCPH/DeepFetal/projects/UltraDino/experiments/vitl16_dinus_preterm_rct_5m/20260518-081332/pretrain/model_final.rank_0.pth #VitL oversampled
    dropout: 0.2
  
  ehr:
    weights_path: 
  
  transform:
    layer_dims: [256]

  pred_head:
    layer_dims: []
    dropout: 0.2
  reg_head:
    layer_dims: []
    dropout: 0.2
    
optimizer:
  type: AdamW
  lr: 5e-5
  lr_decay: 0.65
  weight_decay: 1e-2

  #AdamW
  adamw_params: [0.9,0.999, 1e-8] #Beta1, Beta2, Epsilon
  
scheduler:
  type: cosine_warmup
  num_warmup_steps: 15
  num_cycles: 0.5 #A multiplier for the cosine scheduler. 2 means two cycles over training
  
device:
  type: cuda
