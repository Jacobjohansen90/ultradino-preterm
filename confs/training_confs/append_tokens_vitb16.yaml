# @package _global_

defaults:
  - ../base/base
  - _self_

data:
  path: /projects/users/data/UCPH/DeepFetal/projects/preterm/Data/train.json
  batch_size: 128
  val_frac: 0.05
  workers: 64
  ga_cutoff_weeks: 37 # Is sharp (GA < GA_cutoff) cutoff
  ehr_data: []
  size: [224, 224]
  prefix: /projects/users/data/UCPH/DeepFetal/ultrasound/PNG_processed_no_OCR/

training:
  epochs: 15
  vit_frozen_until: 5  #VIT is frozen until this epoch
  ehr_frozen_until: 10 #EHR is frozen until this epoch

auxiliary:
  method: append

model:
  vit:
    type: vitb16
    weights_path: /projects/users/data/UCPH/DeepFetal/projects/preterm/other_models/weights/model_final.rank_0.pth
  
  ehr:
    weights_path: 
  
  ehr_transform:
    layer_dims: [256]

  predictor:
    layer_dims: [256,64]
    
optimizer:
  type: AdamW
  learning_rate: 1e-4
  weight_decay: 1e-5

  #AdamW
  adamw_params: [0.9,0.999, 1e-8] #Beta1, Beta2, Epsilon
  
scheduler:
  type: cosine_warmup
  num_warmup_steps: 5
  num_cycles: 2 #A multiplier for the cosine scheduler. 2 means two cycles per epoch, 0.5 means half an epoch etc

loss:
  type: bce
  
device:
  type: cuda
